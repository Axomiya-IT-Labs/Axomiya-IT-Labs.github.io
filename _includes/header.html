<header class="site-header">
  <div class="header-container">

    <!-- Brand Logo — fixed left -->
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="Axomiya IT Labs — Home">
      <img src="{{ '/assets/images/icons/icon.svg' | relative_url }}" alt="Axomiya IT Labs" class="logo-svg" width="34" height="34">
      <span class="logo-text">Axomiya IT Labs</span>
    </a>

    <!-- OpenAI Style Search Trigger Box — right after brand logo -->
    <div class="header-search-box">
      <button class="site-search-btn" id="site-search-btn" aria-label="Search website">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span class="search-placeholder">Search site...</span>
        <kbd class="search-kbd">⌘K</kbd>
      </button>
    </div>

    <!-- Spacer — pushes nav to start from visual centre on desktop -->
    <div class="header-spacer" aria-hidden="true"></div>

    <!-- Desktop & Mobile Navigation -->
    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      <ul class="nav-list">
        {% for item in site.data.navigation %}
          <li class="nav-item{% if item.dropdown %} has-dropdown{% endif %}" id="nav-item-{{ forloop.index }}">
            {% if item.dropdown %}
              <button
                class="nav-link nav-link--btn {% if page.url == item.link %}active{% endif %}"
                aria-haspopup="true"
                aria-expanded="false"
                data-dropdown="dropdown-{{ forloop.index }}"
              >
                {{ item.name }}
                <span class="dropdown-arrow" aria-hidden="true">
                  <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
              </button>
              <ul class="dropdown-menu" id="dropdown-{{ forloop.index }}" role="menu">
                {% for subitem in item.dropdown %}
                  <li role="none">
                    <a href="{{ subitem.link | relative_url }}" class="dropdown-item {% if page.url == subitem.link %}active{% endif %}" role="menuitem">
                      {{ subitem.name }}
                    </a>
                  </li>
                {% endfor %}
              </ul>
            {% else %}
              <a href="{{ item.link | relative_url }}" class="nav-link {% if page.url == item.link %}active{% endif %}">
                {{ item.name }}
              </a>
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    </nav>

    <!-- Mobile hamburger — always visible on mobile -->
    <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="site-nav">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

  </div>
</header>

<!-- Search Modal Overlay (OpenAI Style) -->
<div class="search-modal-backdrop" id="search-modal" aria-hidden="true">
  <div class="search-modal-container" role="dialog" aria-modal="true" aria-label="Search site">
    <div class="search-modal-header">
      <svg class="search-input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="search-input" class="search-input" placeholder="Search Axomiya IT Labs..." autocomplete="off" />
      <button class="search-close-btn" id="search-close-btn" aria-label="Close search">ESC</button>
    </div>
    <div class="search-results-wrapper" id="search-results-wrapper">
      <div class="search-hint">Type to search projects, research, guides, and pages...</div>
    </div>
  </div>
</div>

<script>
(function () {
  // ── Hamburger / mobile drawer ──────────────────────────────
  var toggle = document.getElementById('mobile-menu-toggle');
  var nav    = document.getElementById('site-nav');

  function openMobileNav() {
    nav.classList.add('open');
    toggle.classList.add('is-open');
    toggle.setAttribute('aria-expanded', 'true');
    toggle.setAttribute('aria-label', 'Close navigation menu');
    document.body.style.overflow = 'hidden';
  }

  function closeMobileNav() {
    nav.classList.remove('open');
    toggle.classList.remove('is-open');
    toggle.setAttribute('aria-expanded', 'false');
    toggle.setAttribute('aria-label', 'Open navigation menu');
    document.body.style.overflow = '';
  }

  if (toggle && nav) {
    toggle.addEventListener('click', function (e) {
      e.stopPropagation();
      if (nav.classList.contains('open')) { closeMobileNav(); } else { openMobileNav(); }
    });

    // Escape key closes mobile nav
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeMobileNav();
        closeAllDropdowns();
      }
    });
  }

  // ── Click-only dropdowns (desktop + mobile) ────────────────
  var dropdownBtns = document.querySelectorAll('[data-dropdown]');

  function closeAllDropdowns(except) {
    dropdownBtns.forEach(function (btn) {
      if (btn === except) return;
      var menuId = btn.getAttribute('data-dropdown');
      var menu   = document.getElementById(menuId);
      if (menu) {
        menu.classList.remove('is-open');
        menu.removeAttribute('style');
      }
      btn.setAttribute('aria-expanded', 'false');
      btn.classList.remove('dropdown-open');
      var arrow = btn.querySelector('.dropdown-arrow');
      if (arrow) arrow.classList.remove('rotated');
    });
  }

  dropdownBtns.forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      var menuId  = btn.getAttribute('data-dropdown');
      var menu    = document.getElementById(menuId);
      var isOpen  = menu && menu.classList.contains('is-open');
      var arrow   = btn.querySelector('.dropdown-arrow');

      closeAllDropdowns(btn);

      if (!isOpen && menu) {
        menu.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        btn.classList.add('dropdown-open');
        if (arrow) arrow.classList.add('rotated');
      } else {
        if (arrow) arrow.classList.remove('rotated');
        btn.setAttribute('aria-expanded', 'false');
        btn.classList.remove('dropdown-open');
      }
    });
  });

  document.addEventListener('click', function () {
    closeAllDropdowns();
  });

  if (nav) {
    nav.addEventListener('click', function (e) {
      if (!e.target.closest('a')) e.stopPropagation();
    });
  }

  // ── Live Search Engine (OpenAI Style) ────────────────────────
  var searchBtn = document.getElementById('site-search-btn');
  var searchModal = document.getElementById('search-modal');
  var searchCloseBtn = document.getElementById('search-close-btn');
  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results-wrapper');
  var searchIndex = null;

  function fetchSearchIndex() {
    if (searchIndex) return Promise.resolve(searchIndex);
    return fetch('{{ "/search.json" | relative_url }}')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        searchIndex = data;
        return data;
      }).catch(function(err) {
        console.error('Failed to load search index', err);
        return [];
      });
  }

  function openSearch() {
    if (!searchModal) return;
    searchModal.classList.add('active');
    searchModal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    fetchSearchIndex();
    setTimeout(function() {
      if (searchInput) searchInput.focus();
    }, 50);
  }

  function closeSearch() {
    if (!searchModal) return;
    searchModal.classList.remove('active');
    searchModal.setAttribute('aria-hidden', 'true');
    if (!nav || !nav.classList.contains('open')) {
      document.body.style.overflow = '';
    }
    if (searchInput) searchInput.value = '';
    if (searchResults) searchResults.innerHTML = '<div class="search-hint">Type to search projects, research, guides, and pages...</div>';
  }

  if (searchBtn) {
    searchBtn.addEventListener('click', openSearch);
  }
  if (searchCloseBtn) {
    searchCloseBtn.addEventListener('click', closeSearch);
  }
  if (searchModal) {
    searchModal.addEventListener('click', function(e) {
      if (e.target === searchModal) closeSearch();
    });
  }

  // Global Keyboard Shortcut: Ctrl+K or Cmd+K to open search
  document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      if (searchModal.classList.contains('active')) {
        closeSearch();
      } else {
        openSearch();
      }
    }
    if (e.key === 'Escape' && searchModal && searchModal.classList.contains('active')) {
      closeSearch();
    }
  });

  // Live filtering algorithm
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      var query = this.value.trim().toLowerCase();
      if (!query) {
        searchResults.innerHTML = '<div class="search-hint">Type to search projects, research, guides, and pages...</div>';
        return;
      }

      fetchSearchIndex().then(function(index) {
        var matches = index.filter(function(item) {
          var titleMatch = item.title && item.title.toLowerCase().indexOf(query) !== -1;
          var snippetMatch = item.snippet && item.snippet.toLowerCase().indexOf(query) !== -1;
          var typeMatch = item.type && item.type.toLowerCase().indexOf(query) !== -1;
          return titleMatch || snippetMatch || typeMatch;
        });

        if (matches.length === 0) {
          searchResults.innerHTML = '<div class="search-empty">No results found for "<strong>' + escapeHtml(query) + '</strong>"</div>';
          return;
        }

        var html = '<ul class="search-results-list">';
        matches.forEach(function(item) {
          html += '<li class="search-result-item">' +
            '<a href="' + item.url + '">' +
              '<div class="search-result-header">' +
                '<span class="search-result-title">' + escapeHtml(item.title) + '</span>' +
                '<span class="search-result-type">' + escapeHtml(item.type) + '</span>' +
              '</div>' +
              (item.snippet ? '<p class="search-result-snippet">' + escapeHtml(item.snippet) + '</p>' : '') +
            '</a>' +
          '</li>';
        });
        html += '</ul>';
        searchResults.innerHTML = html;
      });
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>
