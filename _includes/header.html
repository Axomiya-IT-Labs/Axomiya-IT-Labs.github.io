<header class="site-header">
  <div class="header-container">
    <!-- Brand Logo acts as Home link -->
    <a href="{{ '/' | relative_url }}" class="site-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">{{ site.title | default: "Axomiya IT Labs" }}</span>
    </a>

    <!-- Main Navigation Loop -->
    <nav class="site-nav">
      <ul class="nav-list">
        {% for item in site.data.navigation %}
          <li class="nav-item{% if item.dropdown %} has-dropdown{% endif %}">
            <a href="{{ item.link | relative_url }}" class="nav-link {% if page.url == item.link %}active{% endif %}">
              {{ item.name }}
              {% if item.dropdown %}<span class="dropdown-arrow">▾</span>{% endif %}
            </a>

            {% if item.dropdown %}
              <ul class="dropdown-menu">
                {% for subitem in item.dropdown %}
                  <li>
                    <a href="{{ subitem.link | relative_url }}" class="dropdown-item {% if page.url == subitem.link %}active{% endif %}">
                      {{ subitem.name }}
                    </a>
                  </li>
                {% endfor %}
              </ul>
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
